{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Añadir nueva serie - CRIMITOONS</title>
    <link rel="stylesheet" href="{% static 'series/navbar.css' %}?v=1">
    <link rel="stylesheet" href="{% static 'series/index.css' %}?v=1009">
</head>
<body>
    {% include 'series/includes/barra_navegacion.html' %}

    <main class="contenedor-landing-ancho" style="padding: 40px 20px;">
        <h1>Añadir una nueva serie a la colección</h1>
        <hr>

        <form method="POST">
            {% csrf_token %}
            <p>
                <label for="titulo">Nombre de la serie o anime:</label><br>
                <input type="text" id="titulo" name="titulo" required>
            </p>

            <p>
                <label for="calificacion">Calificación personal (1 al 10):</label><br>
                <input type="number" id="calificacion" name="calificacion" min="1" max="10" required>
            </p>

            <button type="submit">Buscar y guardar automáticamente</button>
        </form>
    </main>
</body>
</html>
